# cargo-deny configuration — supply-chain / advisory gate.
# Run locally:  cargo deny check
# CI runs:      cargo deny check advisories bans sources
#
# Added with the 2026-06 audit (S3): after switching reqwest to rustls the
# openssl advisories are gone; this keeps the tree advisory-clean over time.

[advisories]
version = 2
# Fail on any security advisory affecting a resolved dependency version.
yanked = "warn"
# If a transitive advisory has no fix yet and must be temporarily accepted,
# add its RUSTSEC id here with a comment and an expiry plan.
ignore = [
    # `paste` is unmaintained (not a vulnerability). It is a transitive build-time
    # proc-macro pulled by kira, wgpu-hal/metal and rapier2d/simba; there is no safe
    # upgrade and no first-party way to remove it. Re-evaluate when those deps drop it.
    "RUSTSEC-2024-0436",
]

[bans]
# Duplicate crate versions only bloat builds; warn rather than fail.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# License checking is intentionally not gated here to avoid brittle failures on
# transitive license metadata. Enable `cargo deny check licenses` with an `allow`
# list when you want to enforce it.
[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib",
    "Unicode-3.0", "Unicode-DFS-2016", "CC0-1.0", "MPL-2.0", "BSL-1.0",
]
