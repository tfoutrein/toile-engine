name: CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build · test · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Linux system libs needed by winit/egui (X11), gilrs (udev), kira (ALSA).
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev \
            libxkbcommon-dev libwayland-dev libxcb1-dev
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets

  audit:
    name: cargo-deny (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Operates on Cargo.lock metadata only — no build deps required.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
